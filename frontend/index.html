<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AWS Cloud Notes Storage System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/styles.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <span class="navbar-brand">AWS Cloud Notes</span>
      </div>
    </nav>

    <main class="container py-4">
      <section class="row g-4">
        <div class="col-lg-4">
          <div class="card">
            <div class="card-header fw-semibold">Upload File</div>
            <div class="card-body">
              <form id="uploadForm">
                <div class="mb-3">
                  <label for="title" class="form-label">Title</label>
                  <input class="form-control" id="title" name="title" maxlength="150" required>
                </div>
                <div class="mb-3">
                  <label for="file" class="form-label">File</label>
                  <input class="form-control" id="file" name="file" type="file" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">Upload</button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="d-flex flex-column flex-md-row gap-2 justify-content-between align-items-md-center mb-3">
            <h1 class="h4 mb-0">Stored Notes</h1>
            <form id="searchForm" class="d-flex gap-2">
              <input id="searchTitle" class="form-control" placeholder="Search by title">
              <button class="btn btn-outline-secondary" type="submit">Search</button>
              <button id="resetSearch" class="btn btn-outline-dark" type="button">Reset</button>
            </form>
          </div>

          <div id="alertHost"></div>

          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Filename</th>
                  <th>Uploaded</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="filesTable"></tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <small id="paginationSummary" class="text-muted"></small>
            <div class="btn-group">
              <button id="prevPage" class="btn btn-outline-secondary btn-sm" type="button">Previous</button>
              <button id="nextPage" class="btn btn-outline-secondary btn-sm" type="button">Next</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/static/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
  </body>
</html>
